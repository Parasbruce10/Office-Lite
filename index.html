    }

    #root {
        width: 100%;

    <script>
    // Footer Ads Logic
    function runFooterAds() {
        const slots = [
            { id: 'ad-slot-1', key: '63bdb46aa078c35a999684b9a4dec76e', h: 50, w: 320 },
            { id: 'ad-slot-3', key: 'b0d24676f6c7513812db2b021f5c6495', h: 250, w: 300 }
        ];
    

        slots.forEach(slotInfo => {
            var el = document.getElementById(slotInfo.id);
            if (el && !el.dataset.loaded) {
                el.dataset.loaded = 'true';
                var opt = document.createElement('script');
                opt.text = "atOptions = {'key':'" + slotInfo.key + "','format':'iframe','height':" + slotInfo.h + ",'width':" + slotInfo.w + ",'params':{}};";
                el.appendChild(opt);
                var scr = document.createElement('script');
                scr.src = 'https://www.highperformanceformat.com/' + slotInfo.key + '/invoke.js';
                el.appendChild(scr);
            }
        });
    }

    // React ka wait karne ke liye interval
    setInterval(runFooterAds, 2000);
    </script>
